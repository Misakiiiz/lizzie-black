<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Restricted Access</title>

<link rel="stylesheet" href="restricted.css">

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Cormorant+Garamond:wght@300;400;500;600&display=swap" rel="stylesheet">

</head>

<body>

<div class="background-noise"></div>

<div class="login-container">

<p class="warning">
RESTRICTED ARCHIVE
</p>

<h1>AUTHORIZATION REQUIRED</h1>

<p class="description">
Este arquivo não está listado em nenhuma área pública do site.
</p>

<form id="loginForm">

<input
type="email"
id="email"
placeholder="Email">

<input
type="password"
id="password"
placeholder="Senha">

<button type="submit">
Acessar Arquivos
</button>

</form>

<p id="error-message"></p>

</div>

<script src="restricted.js"></script>

</body>

</html>
